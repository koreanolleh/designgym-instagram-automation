name: 디자인짐 인스타그램 자동 게시

on:
  schedule:
    - cron: '30 10 * * 1-5'  # KST 저녁 7시반 (UTC 10시반), 월~금
  workflow_dispatch:  # 수동 실행 버튼

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests python-dotenv

      - name: 환경변수 설정
        run: |
          echo "IG_ACCESS_TOKEN=${{ secrets.IG_ACCESS_TOKEN }}" >> .env
          echo "IG_BUSINESS_ACCOUNT_ID=${{ secrets.IG_BUSINESS_ACCOUNT_ID }}" >> .env

      - name: 인스타그램 게시
        run: python post_scheduled.py

      - name: pending_posts.json 커밋 (posted 상태 업데이트)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add pending_posts.json
          git diff --staged --quiet || git commit -m "✅ $(date '+%Y-%m-%d') 게시 완료"
          git push
